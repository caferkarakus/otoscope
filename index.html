<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helix – KBB Eğitim</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-row">
      <div class="brand">
        <img src="assets/images/icons/helix-mark.svg" alt="" class="brand-mark" />
        <span class="wordmark">Helix</span>
      </div>
      <div id="auth-area" class="auth-area">
        <button class="login-btn" type="button">Giriş</button>
      </div>
    </div>
    <nav class="tabs" id="primary-tabs">
      <button class="tab-btn active" data-primary="bolumler">Bölümler</button>
      <button class="tab-btn" data-primary="evreleme">Kanser Evrelemesi</button>
    </nav>
    <div id="subspecialty-bar" class="subspecialty-bar" hidden>
      <button id="back-to-home" class="back-btn">‹ Bölümler</button>
      <h2 id="subspecialty-title" class="subspecialty-title"></h2>
    </div>
    <nav class="tabs" id="content-tabs" hidden>
      <button class="tab-btn active" data-section="ozetler">Özet Kartlar</button>
      <button class="tab-btn" data-section="anatomi">Anatomi</button>
      <button class="tab-btn" data-section="sorular">Sorular</button>
      <button class="tab-btn" data-section="tus">TUS</button>
      <button class="tab-btn" data-section="vakalar">Vaka Sunumları</button>
      <button class="tab-btn" data-section="aciller">Aciller</button>
    </nav>
  </header>

  <main id="content" class="content">
    <section id="bolumler" class="section active"></section>
    <section id="evreleme" class="section"></section>
    <section id="ozetler" class="section"></section>
    <section id="anatomi" class="section"></section>
    <section id="sorular" class="section"></section>
    <section id="tus" class="section"></section>
    <section id="vakalar" class="section"></section>
    <section id="aciller" class="section"></section>
  </main>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <button id="modal-close" class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="auth-modal-overlay" class="modal-overlay">
    <div class="modal auth-modal">
      <button id="auth-modal-close" class="modal-close">&times;</button>
      <div class="auth-tabs">
        <button class="auth-tab-btn active" type="button" data-mode="signin">Giriş Yap</button>
        <button class="auth-tab-btn" type="button" data-mode="signup">Kayıt Ol</button>
      </div>
      <form id="auth-form">
        <label class="auth-field" id="auth-username-field" hidden>
          Kullanıcı Adı
          <input type="text" id="auth-username" minlength="2" maxlength="30" />
        </label>
        <label class="auth-field">
          E-posta
          <input type="email" id="auth-email" required />
        </label>
        <label class="auth-field">
          Şifre
          <input type="password" id="auth-password" required minlength="6" />
        </label>
        <label class="auth-field" id="auth-password-confirm-field" hidden>
          Şifre (Tekrar)
          <input type="password" id="auth-password-confirm" minlength="6" />
        </label>
        <p id="auth-error" class="auth-error" hidden></p>
        <button type="submit" id="auth-submit-btn" class="auth-submit">Giriş Yap</button>
      </form>
      <div id="auth-success" class="auth-success" hidden></div>
    </div>
  </div>

  <!-- İçerik verileri: yeni konu eklemek için bu dosyaları düzenlemeniz yeterli -->
  <script src="assets/js/data/subspecialties.js"></script>
  <script src="assets/js/data/staging.js"></script>
  <script src="assets/js/data/summary-cards.js"></script>
  <script src="assets/js/data/anatomy.js"></script>
  <script src="assets/js/data/questions.js"></script>
  <script src="assets/js/data/tus.js"></script>
  <script src="assets/js/data/cases.js"></script>
  <script src="assets/js/data/emergencies.js"></script>

  <!-- Uygulama mantığı -->
  <script src="assets/js/main.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
